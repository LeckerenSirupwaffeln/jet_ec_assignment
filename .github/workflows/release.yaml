name: Release

on:
  workflow_run:
    workflows: ["CI"]  # Must match the 'name' in your ci.yml
    branches: [main]
    types:
      - completed

  push:
    tags:
      - 'v*'

  workflow_dispatch:

jobs:
  find-apps-with-dockerfile:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        # Finds all directories in apps/ containing a Dockerfile
        # Outputs a JSON array like: ["example_app", "another_app"]
        run: |
          APPS=$(find apps -name "Dockerfile" -exec dirname {} + | xargs -n1 basename | jq -R . | jq -s -c .)
          if [ "$APPS" == "[]" ] || [ -z "$APPS" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "matrix=$APPS" >> $GITHUB_OUTPUT
          fi

  github-release:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build Package
        run: uv build --all

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Development Build' }}
          prerelease: ${{ github.ref_type != 'tag' || contains(github.ref_name, 'beta') }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-release:
    needs: [find-apps-with-dockerfile, github-release]
    if: ${{ needs.find-apps-with-dockerfile.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      # This runs the job in parallel for every app found
      matrix:
        app_name: ${{ fromJson(needs.find-apps-with-dockerfile.outputs.matrix) }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.app_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Generate Version String
        id: versioning
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            # If it's a tag, just use the tag
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            # Get the previous tag (or default to 0.0.0 if none exist)
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
            # Get the short 7-character commit hash
            SHORT_SHA=$(git rev-parse --short HEAD)
            
            # Combine them into a PEP 440 compliant string indicating this is latest
            echo "version=${LATEST_TAG}+latest.${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.app_name }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.versioning.outputs.version }}
