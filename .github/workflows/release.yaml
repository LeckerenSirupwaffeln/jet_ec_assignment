name: Release

on:
  workflow_run:
    workflows: ["CI"]  # Must match the 'name' in your ci.yml
    branches: [main]
    types:
      - completed

  push:
    tags:
      - 'v*'

  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' && contains(github.ref, 'refs/tags/') ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build Package
        run: uv build --all

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Development Build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') || contains(github.ref_name, 'beta') }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
